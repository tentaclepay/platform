name: Deploy x402 facilitator

on:
  workflow_dispatch:

jobs:
  deploy:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/facilitator@v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache m
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run lint
        working-directory: ./packages/facilitator
      - run: bun run typecheck
        working-directory: ./packages/facilitator
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./packages/facilitator
          command: deploy --minify --name=tentaclepay-facilitator
